name: Manual Test (Custom URL)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Lemon8 帖子 URL（多个链接一行一个）'
        required: true
        default: |-
          https://www.lemon8-app.com/@ashreneealtman/7661302423494902302?region=us
      proxy:
        description: '代理地址（⚠️ GitHub跑机在美国，一般不需要代理，留空即可）'
        required: false
        default: ''
      output:
        description: '输出目录'
        required: false
        default: 'images'

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show environment
        run: |
          echo "=== macOS $(sw_vers -productVersion) ==="
          echo "bash: $(bash --version | head -1)"
          echo "curl: $(curl --version | head -1)"
          echo "python3: $(python3 --version)"

      - name: Prepare URL list
        run: |
          # 把输入写入文件，同时按换行和空格拆分 URL
          cat > urls_raw.txt << 'EOF'
          ${{ github.event.inputs.url }}
          EOF
          # 按空格和换行拆分成一行一个
          tr ' \t' '\n' < urls_raw.txt | sed '/^\s*$/d' > urls_test.txt
          # 统计有效链接数
          TOTAL=$(wc -l < urls_test.txt | tr -d ' ')
          echo "--- URLs to process ($TOTAL total) ---"
          cat -n urls_test.txt

      - name: Run download.sh
        run: |
          PROXY_FLAG=""
          RAW_PROXY="${{ github.event.inputs.proxy }}"
          if [ -n "$RAW_PROXY" ]; then
            # 自动补全 http:// 前缀
            case "$RAW_PROXY" in
              http://*|https://*) PROXY_FLAG="-p $RAW_PROXY" ;;
              *) PROXY_FLAG="-p http://$RAW_PROXY" ;;
            esac
          fi
          bash download.sh -f urls_test.txt -o "${{ github.event.inputs.output }}" $PROXY_FLAG 2>&1
          echo ""
          echo "EXIT CODE: $?"

      - name: Show results
        if: always()
        run: |
          echo "=== Downloaded files ==="
          find "${{ github.event.inputs.output }}" -type f 2>/dev/null | head -50 || echo "(no files)"
          echo ""
          echo "=== meta.json content ==="
          find "${{ github.event.inputs.output }}" -name meta.json -exec cat {} \; 2>/dev/null || echo "(no meta.json)"

      - name: Upload downloaded images
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lemon8-images
          path: ${{ github.event.inputs.output }}/**
          retention-days: 7
